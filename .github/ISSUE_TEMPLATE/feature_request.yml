name: Feature request
description: Propose a new capability or API change
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What's the use case this would solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: breaking
    attributes:
      label: Compatibility
      options:
        - label: I'm willing to help implement this
        - label: This would be a breaking change
